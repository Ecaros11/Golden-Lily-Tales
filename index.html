      el.launcher.classList.add("is-hidden");
      el.body.dataset.mode = "play";
      state.sessionStartedAt = Date.now();
      el.recordPanel.classList.remove("is-visible");
      el.body.classList.remove("home-modal-open");
      processNode(state.currentNodeId, { fromHistory: fromSave, showChapter: !fromSave, keepSegment: fromSave });
    }

    function clearReaderSurface() {
      clearTimeout(state.autoplayTimer);
      el.chapterName.textContent = "";
      el.speaker.textContent = "";
      el.speaker.classList.remove("is-visible");
      el.storyText.textContent = "";
      el.storyText.classList.remove("system");
      el.textCard.classList.remove("is-visible");
      el.continueHint.classList.remove("is-visible");
      el.choices.innerHTML = "";
      el.choices.classList.remove("is-visible");
      el.progressFill.style.width = "0%";
    }

    function processNode(nodeId, options = {}) {
      const node = getNode(nodeId);
      el.body.classList.remove("ending-reading");
      state.currentNodeId = nodeId;
      if (!options.keepSegment) state.segmentIndex = 0;
      applyNodeAtmosphere(node);
      updateProgress(node.progress);

      if (node.isEnding) {
        showEnding(node);
        return;
      }

      if (!options.fromHistory) saveGame();
      if (!options.fromHistory && (node.chapterTitle || options.forceCheckpoint)) {
        recordCheckpoint(nodeId, node.chapterTitle || node.title || nodeId, "chapter");
      }

      if (node.routes) {
        const route = node.routes.find(item => safeCheckCondition(item.condition, `路由 ${nodeId}`));
        if (route) {
          safeProcessNode(route.next, options, `路由 ${nodeId}`);
          return;
        }
        if (!node.segments && !node.choices && !node.next) {
          handleDeadEnd(nodeId, "没有任何 routes 条件命中。请检查该节点是否缺少 default 路由，或当前数值正好落在条件空档。");
          return;
        }
      }

      const scene = normalizeScene(node);
      if (shouldShowSceneTransition(scene, options)) {
        state.currentSceneKey = scene.key;
        showSceneTransition(scene, () => renderSegment());
      } else if (scene) {
        state.currentSceneKey = scene.key;
        renderSegment();
      } else if (node.chapterTitle && options.showChapter !== false) {
        showOverlay(node.chapterTitle, node.title || "", 1700, () => renderSegment());
      } else {
        renderSegment();
      }
    }

    function renderSegment() {
      clearTimeout(state.autoplayTimer);
      const node = getNode(state.currentNodeId);
      const segments = node.segments || [];

      if (state.segmentIndex >= segments.length) {
        el.continueHint.classList.remove("is-visible");
        if (node.choices) {
          renderChoiceContext(node);
          renderChoices(node.choices);
        } else if (node.next) {
          safeProcessNode(node.next, { showChapter: true }, `节点 ${state.currentNodeId} 的 next`);
        } else {
          handleDeadEnd(state.currentNodeId, "正文播放完毕，但没有 choices、next、routes 或结局标记。");
        }
        return;
      }

      const segment = normalizeSegment(segments[state.segmentIndex]);
      el.choices.classList.remove("is-visible");
      el.choices.innerHTML = "";
      el.textCard.classList.remove("is-visible");

      setTimeout(() => {
        el.chapterName.textContent = getSceneDisplayLabel(node);
        if (segment.speaker) {
          el.speaker.textContent = segment.speaker;
          el.speaker.classList.add("is-visible");
        } else {
          el.speaker.textContent = "";
          el.speaker.classList.remove("is-visible");
        }
        el.storyText.textContent = segment.text;
        el.storyText.classList.toggle("system", isSystemSpeaker(segment.speaker));
        el.textCard.scrollTop = 0;
        el.textCard.classList.add("is-visible");
        el.continueHint.classList.add("is-visible");
        runEffects(segment.effects);
        scheduleAutoplay();
        updateStatus();
      }, 180);
    }

    function renderChoiceContext(node) {
      const segments = node.segments || [];
      el.chapterName.textContent = getSceneDisplayLabel(node);
      if (!segments.length) {
        if (!el.storyText.textContent.trim()) {
          el.speaker.textContent = "";
          el.speaker.classList.remove("is-visible");
          el.storyText.textContent = node.title || node.chapterTitle || "";
          el.storyText.classList.remove("system");
          el.textCard.classList.toggle("is-visible", Boolean(el.storyText.textContent.trim()));
        }
        return;
      }

      const index = Math.max(0, Math.min(segments.length - 1, state.segmentIndex - 1));
      const segment = normalizeSegment(segments[index]);
      if (segment.speaker) {
        el.speaker.textContent = segment.speaker;
        el.speaker.classList.add("is-visible");
      } else {
        el.speaker.textContent = "";
        el.speaker.classList.remove("is-visible");
      }
      el.storyText.textContent = segment.text;
      el.storyText.classList.toggle("system", isSystemSpeaker(segment.speaker));
      el.textCard.scrollTop = 0;
      el.textCard.classList.add("is-visible");
    }

    function renderChoices(choices) {
      clearTimeout(state.autoplayTimer);
      el.choices.innerHTML = "";
      const visibleChoices = choices.filter(choice => safeCheckCondition(choice.condition, `选项@${state.currentNodeId}`));

      recordChoicePoint();
      visibleChoices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.type = "button";
        const label = document.createElement("span");
        label.textContent = choice.text || "继续";
        button.appendChild(label);
        const count = getChoiceStatCount(choice);
        if (state.settings.trackChoiceStats && count > 0) {
          const stat = document.createElement("span");
          stat.className = "choice-stat-count";
          stat.textContent = `已选择 ${count} 次`;
          button.appendChild(stat);
        }
        button.addEventListener("click", event => {
          event.stopPropagation();
          choose(choice);
        });
        el.choices.appendChild(button);
      });

      if (!visibleChoices.length) {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.type = "button";
        button.textContent = "没有可用选项，退回上一个检查点";
        button.addEventListener("click", event => {
          event.stopPropagation();
          returnToPreviousCheckpoint();
        });
        el.choices.appendChild(button);
      }

      setTimeout(() => el.choices.classList.add("is-visible"), 120);
    }

    function choose(choice) {
      if (state.isInputLocked) return;
      pushPageHistory();
      recordChoiceStat(choice);
      state.lastChoiceSnapshot = captureChoiceSnapshot({ includeChoiceHistory: true });
      state.pendingEndingAchievements = [];
      const directNextNode = state.story?.nodes?.[choice.next];
      const directEnding = Boolean(directNextNode?.isEnding);
      el.choices.classList.remove("is-visible");
      try {
        const unlocked = applyChanges(choice.changes, { silentAchievements: directEnding, choiceText: choice.text || "" });
        if (directEnding) state.pendingEndingAchievements = unlocked;
      } catch (error) {
        console.error("选项状态变化失败", choice, error);
        showToast("状态写入失败", "已跳过异常状态变化，剧情会继续。");
      }
      const effects = mergeEffects(choice.effect, choice.effects);
      runEffects(effects);
      saveGame();
      setTimeout(() => safeProcessNode(choice.next, { showChapter: true }, `选项 ${choice.text || ""}`), effects.length ? 260 : 80);
    }

    function applyChanges(changes, options = {}) {
      const unlocked = [];
      if (!changes) return unlocked;
      if (typeof changes.val === "number") state.val = clampNumber(state.val + changes.val, 0, 100);
      if (typeof changes.valSet === "number") state.val = clampNumber(changes.valSet, 0, 100);
      if (changes.addFlag) addFlagRecord(changes.addFlag, changes.important === true || changes.importantFlag === true, options);
      if (Array.isArray(changes.addFlags)) changes.addFlags.forEach(flag => addFlagRecord(flag, changes.important === true || changes.importantFlag === true, options));
      if (changes.importantFlag && changes.importantFlag !== true) addFlagRecord(changes.importantFlag, true, options);
      if (Array.isArray(changes.importantFlags)) changes.importantFlags.forEach(flag => addFlagRecord(flag, true, options));
      if (changes.removeFlag) removeFlagRecord(changes.removeFlag);
      if (changes.set && typeof changes.set === "object") {
        Object.assign(state.vars, changes.set);
      }
      if (changes.unlockAchievement) {
        const achievement = recordAchievement(changes.unlockAchievement, { silent: options.silentAchievements });
        if (achievement) unlocked.push(achievement);
      }
      if (Array.isArray(changes.unlockAchievements)) {
        changes.unlockAchievements.forEach(ref => {
          const achievement = recordAchievement(ref, { silent: options.silentAchievements });
          if (achievement) unlocked.push(achievement);
        });
      }
      updateStatus();
      return unlocked;
    }

    function normalizeFlagEntry(flag) {
      if (!flag) return null;
      if (typeof flag === "string") return { id: flag, label: "" };
      if (typeof flag === "object") {
        const id = flag.id || flag.name || flag.flag || "";
        if (!id) return null;
        return { id, label: flag.label || flag.title || flag.text || "" };
      }
      return null;
    }

    function getFlagDisplayLabel(entry) {
      if (!entry?.id) return "";
      return entry.label || state.flagLabels?.[entry.id] || entry.id;
    }

    function addFlagRecord(flag, important = false, context = {}) {
      const entry = normalizeFlagEntry(flag);
      if (!entry) return false;
      state.flagLabels = state.flagLabels || {};
      state.keyDecisions = state.keyDecisions || [];
      const isNew = !state.flags.includes(entry.id);
      if (isNew) state.flags.push(entry.id);
      const label = entry.label || state.flagLabels?.[entry.id] || context.choiceText || getFlagDisplayLabel(entry);
      if (entry.label || important) state.flagLabels[entry.id] = label;
      if (important) recordKeyDecision(entry.id, label, context);
      if (important && isNew) showImportantDecision(label);
      return isNew;
    }

    function removeFlagRecord(flag) {
      const entry = normalizeFlagEntry(flag);
      if (!entry) return;
      state.flags = state.flags.filter(item => item !== entry.id);
    }

    function recordKeyDecision(id, label, context = {}) {
      if (!id) return;
      const readableLabel = label || id;
      const existing = state.keyDecisions.find(item => item.id === id);
      if (existing) {
        if (readableLabel && readableLabel !== id) existing.label = readableLabel;
        else existing.label = existing.label || readableLabel;
        if (!existing.choiceText && context.choiceText) existing.choiceText = context.choiceText;
        return;
      }
      state.keyDecisions.push({
        id,
        label: readableLabel,
        choiceText: context.choiceText || "",
        nodeId: state.currentNodeId,
        val: Math.round(state.val || 0),
        at: new Date().toISOString()
      });
      if (state.keyDecisions.length > 40) state.keyDecisions.shift();
    }

    function checkCondition(condition) {
      if (!condition || condition === "default") return true;
      if (typeof condition === "string") return checkStringCondition(condition);
      if (Array.isArray(condition.all)) return condition.all.every(checkCondition);
      if (Array.isArray(condition.any)) return condition.any.some(checkCondition);
      if (condition.not) return !checkCondition(condition.not);
      if (condition.flag) return state.flags.includes(condition.flag);
      if (condition.var) {
        const value = condition.var === "val" ? state.val : state.vars[condition.var];
        return compare(value, condition.op || "==", condition.value);
      }
      return false;
    }

    function checkStringCondition(condition) {
      const text = condition.trim();
      if (text === "default") return true;

      const flagMatch = text.match(/^!?hasFlag\s+['"]([^'"]+)['"]$/);
      if (flagMatch) {
        const has = state.flags.includes(flagMatch[1]);
        return text.startsWith("!") ? !has : has;
      }

      const compareMatch = text.match(/^([a-zA-Z_][\w]*)\s*(>=|<=|>|<|==|!=)\s*(.+)$/);
      if (compareMatch) {
        const [, key, op, rawTarget] = compareMatch;
        const value = key === "val" ? state.val : state.vars[key];
        const target = parseLiteral(rawTarget);
        return compare(value, op, target);
      }

      return Boolean(state.vars[text]);
    }

    function compare(left, op, right) {
      if (op === ">=") return Number(left) >= Number(right);
      if (op === "<=") return Number(left) <= Number(right);
      if (op === ">") return Number(left) > Number(right);
      if (op === "<") return Number(left) < Number(right);
      if (op === "!=") return left != right;
      return left == right;
    }

    function safeCheckCondition(condition, context) {
      try {
        return checkCondition(condition);
      } catch (error) {
        console.error("条件判断失败", context, condition, error);
        showToast("条件判断失败", `${context}：${error.message}`);
        return false;
      }
    }

    function safeProcessNode(nodeId, options, context) {
      try {
        if (!nodeId || !state.story?.nodes?.[nodeId]) {
          handleDeadEnd(state.currentNodeId || "", `${context} 指向不存在的节点：${nodeId || "空"}`);
          return;
        }
        processNode(nodeId, options);
      } catch (error) {
        console.error("节点处理失败", context, nodeId, error);
        handleDeadEnd(state.currentNodeId || nodeId || "", `${context} 处理失败：${error.message}`);
      }
    }

    function safeLocalSet(key, value, label = "本地记录") {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (error) {
        try {
          localStorage.removeItem(key);
          localStorage.setItem(key, value);
          return true;
        } catch (retryError) {
          error = retryError;
        }
        console.error(`${label}写入失败`, key, error);
        const warningKey = `${label}:${error?.name || "error"}`;
        if (!storageWarningKeys.has(warningKey)) {
          storageWarningKeys.add(warningKey);
          showToast(`${label}写入失败`, "浏览器本地空间可能不足，剧情会继续，但记录可能无法保存。");
        }
        return false;
      }
    }

    function safeLocalRemove(key, label = "本地记录") {
      try {
        localStorage.removeItem(key);
        return true;
      } catch (error) {
        console.error(`${label}删除失败`, key, error);
        return false;
      }
    }

    function handleDeadEnd(nodeId, reason) {
      clearTimeout(state.autoplayTimer);
      state.isInputLocked = false;
      el.continueHint.classList.remove("is-visible");
      el.choices.innerHTML = "";
      el.choices.classList.remove("is-visible");
      el.textCard.classList.add("is-visible");
      el.speaker.textContent = "系统";
      el.speaker.classList.add("is-visible");
      el.storyText.classList.add("system");
      el.storyText.textContent = `剧情在节点「${nodeId}」停止。\n${reason}\n\n你可以退回上一个检查点，或回到作品主页。`;

      const checkpointButton = document.createElement("button");
      checkpointButton.className = "choice-btn";
      checkpointButton.type = "button";
      checkpointButton.textContent = "退回上一个检查点";
      checkpointButton.addEventListener("click", event => {
        event.stopPropagation();
        returnToPreviousCheckpoint();
      });

      const homeButton = document.createElement("button");
      homeButton.className = "choice-btn";
      homeButton.type = "button";
      homeButton.textContent = "回到作品主页";
      homeButton.addEventListener("click", event => {
        event.stopPropagation();
        returnToHome();
      });

      el.choices.append(checkpointButton, homeButton);
      setTimeout(() => el.choices.classList.add("is-visible"), 80);
      showToast("剧情停止", reason);
      updateStatus();
    }

    function showEnding(node) {
      applyNodeAtmosphere(node);
      el.body.classList.add("ending-reading");
      updateProgress(node.progress ?? 100);
      state.currentNodeId = Object.keys(state.story.nodes).find(key => state.story.nodes[key] === node) || state.currentNodeId;
      recordEnding(node);
      recordEndingReached(node);
      const achievements = [...state.pendingEndingAchievements];
      if (node.achievement) {
        const achievement = recordAchievement(node.achievement, { silent: true });
        if (achievement) achievements.push(achievement);
      }
      savePreEndingAutoSave();
      el.choices.classList.remove("is-visible");
      el.continueHint.classList.remove("is-visible");
      el.textCard.classList.remove("is-visible");

      setTimeout(() => {
        el.chapterName.textContent = node.type || "ENDING";
        el.speaker.textContent = node.title || "结局";
        el.speaker.classList.add("is-visible");
        el.storyText.textContent = getEndingText(node);
        el.storyText.classList.add("system");
        el.textCard.classList.add("is-visible");
        renderEndingConfirm(node, achievements);
      }, 200);
    }

    function renderEndingConfirm(node, achievements) {
      el.choices.innerHTML = "";
      const button = document.createElement("button");
      button.className = "choice-btn";
      button.type = "button";
      button.textContent = "确定";
      button.addEventListener("click", event => {
        event.stopPropagation();
        el.choices.classList.remove("is-visible");
        runEffects(node.effects || node.effect || []);
        setTimeout(() => showEndingOverlay(node, achievements), 520);
      });
      el.choices.appendChild(button);
      setTimeout(() => el.choices.classList.add("is-visible"), 260);
    }

    function savePreEndingAutoSave() {
      const snapshot = state.lastChoiceSnapshot || state.history[state.history.length - 1];
      if (!snapshot) return;
      saveSnapshotAsAuto(compactSnapshot(snapshot));
      state.lastChoiceSnapshot = null;
      state.pendingEndingAchievements = [];
    }

    function saveSnapshotAsAuto(snapshot) {
      if (!state.story || !snapshot) return;
      const save = {
        storyTitle: state.story.meta.title,
        snapshot
      };
      safeLocalSet(`${state.storageKey}_save`, JSON.stringify(save), "自动存档");
    }

    function showEndingOverlay(node, achievements = []) {
      state.isInputLocked = true;
      el.overlayTitle.textContent = node.title || "结局";
      el.overlaySub.textContent = `${node.type || "ENDING"} · 点击继续`;
      el.overlayScreen.classList.remove("is-hidden");
      el.overlayScreen.classList.add("is-interactive");
      el.overlayScreen.setAttribute("aria-hidden", "false");

      const proceed = () => {
        el.overlayScreen.removeEventListener("click", proceed);
        document.removeEventListener("keydown", handleKey);
        if (achievements.length) {
          showAchievementOverlay(achievements[0]);
        } else {
          finishEndingReturnHome("none");
        }
      };
      const handleKey = event => {
        if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          proceed();
        }
      };
      el.overlayScreen.addEventListener("click", proceed);
      document.addEventListener("keydown", handleKey);
    }

    function getEndingText(node) {
      const body = node.description || "";
      const closing = node.closing || node.finalText || node.epilogue || "";
      return [body, closing].filter(Boolean).join("\n\n");
    }

    function showAchievementOverlay(achievement) {
      el.overlayTitle.textContent = "成就解锁";
      el.overlaySub.textContent = achievement.title || achievement.id || "";
      el.overlayScreen.classList.remove("is-hidden");
      el.overlayScreen.classList.remove("is-interactive");
      el.overlayScreen.setAttribute("aria-hidden", "false");
      setTimeout(() => {
        finishEndingReturnHome("none");
      }, 2400);
    }

    function finishEndingReturnHome(recordKind = "endings") {
      flushPlayTime(true);
      el.overlayScreen.classList.add("is-hidden");
      el.overlayScreen.classList.remove("is-interactive");
      el.overlayScreen.setAttribute("aria-hidden", "true");
      state.isInputLocked = false;
      el.body.classList.remove("ending-reading");
      el.body.dataset.mode = "launcher";
      el.launcher.classList.remove("is-hidden");
      checkContinue();
      renderHomeRecords(recordKind);
    }

    function showOverlay(title, sub, duration, callback) {
      state.isInputLocked = true;
      el.overlayTitle.textContent = title || "";
      el.overlaySub.textContent = sub || "";
      el.overlayScreen.classList.remove("is-hidden");
      el.overlayScreen.classList.remove("is-interactive");
      el.overlayScreen.setAttribute("aria-hidden", "false");
      setTimeout(() => {
        el.overlayScreen.classList.add("is-hidden");
        el.overlayScreen.setAttribute("aria-hidden", "true");
        state.isInputLocked = false;
        if (callback) callback();
      }, duration);
    }

    function showSceneTransition(scene, callback) {
      const lines = [scene.description, scene.arrival || scene.intro].filter(Boolean);
      state.isInputLocked = true;
      el.sceneTitle.textContent = scene.name || "";
      el.sceneCopy.textContent = lines.join("\n");
      el.body.classList.add("scene-transitioning");
      el.sceneCard.classList.remove("is-hidden");
      el.sceneCard.setAttribute("aria-hidden", "false");
      const finish = event => {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
        }
        clearTimeout(state.sceneTransitionTimer);
        document.removeEventListener("keydown", finish);
        el.sceneCard.removeEventListener("click", finish);
        el.body.classList.remove("scene-transitioning");
        el.sceneCard.classList.add("is-hidden");
        el.sceneCard.setAttribute("aria-hidden", "true");
        state.isInputLocked = false;
        if (callback) callback();
      };
      document.addEventListener("keydown", finish);
      el.sceneCard.addEventListener("click", finish);
    }

    function runEffects(effects) {
      const names = mergeEffects(effects);
      names.forEach(name => {
        const effectName = normalizeEffectName(name);
        const className = `fx-${effectName}`;
        el.body.classList.remove(className);
        void el.body.offsetWidth;
        el.body.classList.add(className);
        setTimeout(() => el.body.classList.remove(className), EFFECT_DURATIONS[effectName] || EFFECT_DURATIONS[name] || 900);
        if (effectName === "shake" && "vibrate" in navigator) navigator.vibrate(120);
      });
    }

    function applyNodeAtmosphere(node) {
      const meta = state.story.meta;
      applyTheme("neutral");
      applyAmbient(node.ambient || node.atmosphere || node.theme || meta.ambient || meta.atmosphere || meta.theme || "none");
    }

    function applyTheme(theme) {
      el.body.dataset.theme = "neutral";
    }

    function applyAmbient(ambient) {
      const raw = typeof ambient === "string" ? ambient : "none";
      const mapped = raw === "sea" ? "tide" : raw;
      const name = ["none", "rain", "wind", "tide", "heat", "static"].includes(mapped) ? mapped : "none";
      el.body.dataset.ambient = name;
    }

    function normalizeEffectName(effect) {
      const name = String(effect || "").trim();
      return EFFECT_ALIASES[name] || name;
    }

    function normalizeScene(node) {
      const scene = node?.scene;
      if (!scene) return null;
      if (typeof scene === "string") {
        const name = scene.trim();
        if (!name) return null;
        return { key: name, name, description: "" };
      }
      if (typeof scene === "object") {
        const name = scene.name || scene.title || scene.id || "";
        if (!name) return null;
        return {
          key: scene.id || name,
          name,
          description: scene.description || "",
          arrival: scene.arrival || scene.arrivalText || scene.intro || "",
          intro: scene.intro || "",
          type: scene.type || scene.kind || "major",
          duration: Number(scene.duration) || 0
        };
      }
      return null;
    }

    function shouldShowSceneTransition(scene, options = {}) {
      if (!scene || options.showScene === false || options.fromHistory || options.keepSegment) return false;
      if (["transient", "passing", "brief", "minor"].includes(scene.type)) return false;
      return scene.key !== state.currentSceneKey;
    }

    function getSceneDisplayLabel(node) {
      const scene = normalizeScene(node);
      if (!scene) return node.title || node.chapterTitle || "";
      if (node.title && node.title !== scene.name) return `${scene.name} / ${node.title}`;
      return scene.name;
    }

    function updateStatus() {
      el.variableValue.textContent = Math.round(state.val);
      el.variableFill.style.width = `${clampNumber(state.val, 0, 100)}%`;
      el.variableName.textContent = state.story?.meta.variableName || "状态值";
      el.backBtn.disabled = !state.story || (state.choiceHistory.length === 0 && state.history.length === 0 && state.segmentIndex <= 0);
      el.pageBackBtn.disabled = !state.story || (state.pageHistory.length === 0 && state.segmentIndex <= 0 && !el.choices.classList.contains("is-visible"));
    }

    function updateProgress(progress = 0) {
      el.progressFill.style.width = `${clampNumber(progress, 0, 100)}%`;
    }

    function pushHistory() {
      const snapshot = getSnapshot({ includeHistory: false });
      const last = state.history[state.history.length - 1];
      if (!last || last.currentNodeId !== snapshot.currentNodeId) {
        state.history.push(snapshot);
        if (state.history.length > 80) state.history.shift();
      }
      updateStatus();
      saveGame();
    }

    function pushPageHistory() {
      if (!state.story || !state.currentNodeId) return;
      const snapshot = getSnapshot({ includeHistory: false, includeChoiceHistory: false });
      snapshot.wasChoiceVisible = el.choices.classList.contains("is-visible");
      snapshot.displayText = el.storyText.textContent || "";
      snapshot.displaySpeaker = el.speaker.textContent || "";
      state.pageHistory.push(compactPageSnapshot(snapshot));
      if (state.pageHistory.length > 120) state.pageHistory.shift();
    }

    function captureChoiceSnapshot(options = {}) {
      const node = getNode(state.currentNodeId);
      const snapshot = getSnapshot({
        includeHistory: false,
        includeChoiceHistory: options.includeChoiceHistory === true
      });
      snapshot.segmentIndex = (node.segments || []).length;
      snapshot.choiceLabel = node.title || node.chapterTitle || state.currentNodeId;
      snapshot.choiceAt = new Date().toISOString();
      return snapshot;
    }

    function isSameChoiceSnapshot(left, right) {
      if (!left || !right) return false;
      return left.currentNodeId === right.currentNodeId
        && Number(left.segmentIndex || 0) === Number(right.segmentIndex || 0)
        && Number(left.val || 0) === Number(right.val || 0)
        && JSON.stringify(left.vars || {}) === JSON.stringify(right.vars || {})
        && JSON.stringify(left.flags || []) === JSON.stringify(right.flags || [])
        && JSON.stringify(left.keyDecisions || []) === JSON.stringify(right.keyDecisions || []);
    }

    function isCurrentChoiceSnapshot(snapshot) {
      if (!snapshot || !el.choices.classList.contains("is-visible")) return false;
      return isSameChoiceSnapshot(snapshot, captureChoiceSnapshot());
    }

    function recordChoicePoint() {
      if (!state.story || !state.currentNodeId) return;
      const snapshot = captureChoiceSnapshot();
      if (state.skipNextChoiceCheckpoint) {
        state.skipNextChoiceCheckpoint = false;
        return;
      }
      const last = state.choiceHistory[state.choiceHistory.length - 1];
      if (!isSameChoiceSnapshot(last, snapshot)) {
        state.choiceHistory.push(snapshot);
        if (state.choiceHistory.length > 80) state.choiceHistory.shift();
      }
      recordCheckpoint(state.currentNodeId, snapshot.choiceLabel || "选择前", "choice", snapshot);
      updateStatus();
      saveGame();
    }

    function takePreviousChoiceSnapshot() {
      if (!state.choiceHistory.length) return null;
      if (isCurrentChoiceSnapshot(state.choiceHistory[state.choiceHistory.length - 1])) {
        state.choiceHistory.pop();
      }
      return state.choiceHistory.pop() || null;
    }

    function restoreChoiceSnapshot(snapshot) {
      const remainingChoiceHistory = state.choiceHistory.map(item => deepClone(item));
      state.skipNextChoiceCheckpoint = true;
      restoreSnapshot(snapshot);
      state.choiceHistory = remainingChoiceHistory;
      el.choices.classList.remove("is-visible");
      el.continueHint.classList.remove("is-visible");
      processNode(state.currentNodeId, { fromHistory: true, showChapter: false, keepSegment: true });
      saveGame();
      updateStatus();
    }

    function goBack() {
      if (state.isInputLocked || !state.story) return;
      clearTimeout(state.autoplayTimer);
      const choiceSnapshot = takePreviousChoiceSnapshot();
      if (choiceSnapshot) {
        restoreChoiceSnapshot(choiceSnapshot);
        showToast("已退回上一个选择", choiceSnapshot.choiceLabel || choiceSnapshot.currentNodeId);
        return;
      }
      const node = getNode(state.currentNodeId);
      if (el.choices.classList.contains("is-visible") && (node.segments || []).length) {
        el.choices.classList.remove("is-visible");
        state.segmentIndex = Math.max(0, (node.segments || []).length - 1);
        saveGame();
        renderSegment();
        return;
      }
      if (!el.choices.classList.contains("is-visible") && state.segmentIndex > 0) {
        state.segmentIndex -= 1;
        saveGame();
        renderSegment();
        return;
      }
      if (!state.history.length) {
        showToast("没有更早的记录", "当前已经在可回退范围的起点。");
        return;
      }
      const snapshot = state.history.pop();
      restoreSnapshot(snapshot);
      processNode(state.currentNodeId, { fromHistory: true, showChapter: false });
    }

    function goBackPage() {
      if (state.isInputLocked || !state.story) return;
      clearTimeout(state.autoplayTimer);
      if (el.choices.classList.contains("is-visible")) {
        const node = getNode(state.currentNodeId);
        if ((node.segments || []).length) {
          el.choices.classList.remove("is-visible");
          state.segmentIndex = Math.max(0, (node.segments || []).length - 1);
          saveGame();
          renderSegment();
          return;
        }
      }
      if (state.segmentIndex > 0) {
        state.segmentIndex -= 1;
        saveGame();
        renderSegment();
        return;
      }
      const snapshot = state.pageHistory.pop();
      if (!snapshot) {
        showToast("没有上一页", "当前已经在本段阅读记录的起点。");
        return;
      }
      restoreSnapshot(snapshot);
      if (snapshot.wasChoiceVisible) {
        const node = getNode(state.currentNodeId);
        state.segmentIndex = (node.segments || []).length;
        renderChoices(node.choices || []);
      } else {
        processNode(state.currentNodeId, { fromHistory: true, showChapter: false, keepSegment: true });
      }
    }

    function skipToChoice() {
      if (!state.story || state.isInputLocked) return;
      const node = getNode(state.currentNodeId);
      if (node.isEnding || el.choices.classList.contains("is-visible")) return;
      const segments = node.segments || [];
      if (segments.length) {
        state.segmentIndex = segments.length;
        renderSegment();
      }
    }

    function openMenu() {
      el.menuSummary.textContent = state.story
        ? `${state.story.meta.title} · ${state.currentNodeId || "未开始"}`
        : "当前没有正在运行的故事。";
      el.menuChapterList.classList.add("is-hidden");
      el.menuChapterList.innerHTML = "";
      el.menuPanel.classList.remove("is-hidden");
      el.menuPanel.setAttribute("aria-hidden", "false");
    }

    function closeMenu() {
      el.menuPanel.classList.add("is-hidden");
      el.menuPanel.setAttribute("aria-hidden", "true");
    }

    function returnToHome() {
      clearTimeout(state.autoplayTimer);
      flushPlayTime(true);
      if (state.story && state.currentNodeId) saveGame();
      closeMenu();
      el.body.classList.remove("ending-reading");
      el.body.dataset.mode = "launcher";
      el.launcher.classList.remove("is-hidden");
      checkContinue();
      renderHomeRecords("none");
    }

    function recordEnding(node) {
      const endings = readEndings();
      const title = node.title || "未命名结局";
      if (!endings.some(item => item.title === title)) {
        endings.push({ title, type: node.type || "ENDING", at: new Date().toISOString() });
        safeLocalSet(`${state.storageKey}_endings`, JSON.stringify(endings), "结局记录");
      }
      state.endings = endings;
    }

    function recordAchievement(achievementRef, options = {}) {
      const achievements = readAchievements();
      const achievement = resolveAchievement(achievementRef);
      if (!achievement || achievements.some(item => item.id === achievement.id)) return null;
      achievements.push({ ...achievement, at: new Date().toISOString() });
      safeLocalSet(`${state.storageKey}_achievements`, JSON.stringify(achievements), "成就记录");
      state.achievements = achievements;
      if (!options.silent) showToast("成就解锁", achievement.title);
      return achievement;
    }

    function resolveAchievement(achievementRef) {
      if (!achievementRef) return null;
      if (typeof achievementRef === "object") {
        return {
          id: achievementRef.id || slug(achievementRef.title || "achievement"),
          title: achievementRef.title || "未命名成就",
          description: achievementRef.description || ""
        };
      }
      const id = String(achievementRef);
      const definition = state.story?.achievements?.[id];
      return {
        id,
        title: definition?.title || id,
        description: definition?.description || ""
      };
    }

    function renderHomeRecords(kind) {
      if (!state.story || kind === "none") {
        closeHomePanel(el.recordPanel);
        state.homeRecordKind = "";
        return;
      }

      if (state.homeRecordKind === kind && el.recordPanel.classList.contains("is-visible")) {
        closeHomePanel(el.recordPanel);
        state.homeRecordKind = "";
        return;
      }

      el.recordList.innerHTML = "";
      el.recordList.classList.remove("wide");
      el.recordPanel.classList.remove("is-closing");
      el.recordPanel.classList.add("is-visible");
      state.homeRecordKind = kind;
      syncHomeModalState();

      if (kind === "endings") {
        el.recordTitle.textContent = "结局记录";
        const endings = readEndings();
        const endingNodes = getEndingDefinitions();
        if (!endingNodes.length && !endings.length) {
          appendRecordItem("尚未抵达任何结局", "故事还没有留下终点。", false);
          return;
        }
        if (endingNodes.length) {
          const unlocked = new Set(endings.map(item => item.title));
          endingNodes.forEach(ending => {
            const isUnlocked = unlocked.has(ending.title);
            appendRecordItem(isUnlocked ? ending.title : "？？？", isUnlocked ? (ending.type || "ENDING") : "尚未解锁", !isUnlocked, true);
          });
        } else {
          endings.forEach(ending => appendRecordItem(ending.title, ending.type || "ENDING", false));
        }
        return;
      }

      if (kind === "saves") {
        renderSaveSlots();
        return;
      }

      if (kind === "chapters") {
        renderChapterSelect();
        return;
      }

      if (kind === "stats") {
        renderPlayStats();
        return;
      }

      if (kind === "settings") {
        renderSettings();
        return;
      }

      el.recordTitle.textContent = "成就记录";
      const achievements = readAchievements();
      const unlockedIds = new Set(achievements.map(item => item.id));
      const definitions = state.story.achievements || {};
      const knownItems = Object.entries(definitions).map(([id, item]) => ({
        id,
        title: item.title || id,
        description: item.description || ""
      }));
      const extraItems = achievements.filter(item => !definitions[item.id]);
      const allItems = knownItems.length ? [...knownItems, ...extraItems] : achievements;

      if (!allItems.length) {
        appendRecordItem("暂无成就", "这个剧本没有定义成就，或尚未解锁。", false);
        return;
      }

      allItems.forEach(item => {
        const unlocked = unlockedIds.has(item.id);
        appendRecordItem(unlocked ? item.title : "？？？", unlocked ? (item.description || "已解锁") : "尚未解锁", !unlocked, true);
      });
    }

    function syncHomeModalState() {
      const recordOpen = el.recordPanel?.classList.contains("is-visible");
      el.body.classList.toggle("home-modal-open", Boolean(recordOpen));
    }

    function closeHomeModals() {
      closeHomePanel(el.recordPanel);
      state.homeRecordKind = "";
    }

    function closeHomePanel(panel) {
      if (!panel) return;
      if (!panel.classList.contains("is-visible")) return;
      panel.classList.add("is-closing");
      setTimeout(() => {
        panel.classList.remove("is-visible", "is-closing");
        syncHomeModalState();
      }, 220);
    }

    function appendRecordItem(titleText, bodyText, locked, showUnknown = false) {
      const item = document.createElement("div");
      item.className = `record-item${locked ? " locked" : ""}`;
      if (locked && showUnknown) {
        const mark = document.createElement("div");
        mark.className = "unknown-mark";
        mark.textContent = "???";
        item.appendChild(mark);
      }
      const title = document.createElement("strong");
      title.textContent = titleText;
      const body = document.createElement("span");
      body.textContent = bodyText;
      item.append(title, body);
      el.recordList.appendChild(item);
    }

    function getEndingDefinitions() {
      if (!state.story?.nodes) return [];
      return Object.values(state.story.nodes)
        .filter(node => node?.isEnding)
        .map(node => ({
          title: node.title || "未命名结局",
          type: node.type || "ENDING"
        }));
    }

    function renderSettings() {
      el.recordTitle.textContent = "设置";
      el.recordList.classList.add("wide");
      const wrapper = document.createElement("div");
      wrapper.className = "setting-grid";
      wrapper.innerHTML = `
        <div class="setting-card">
          <label for="settingColorMode">明暗模式</label>
          <select class="select-field" id="settingColorMode" data-setting="colorMode">
            <option value="light">浅色模式</option>
            <option value="dark">深色模式</option>
          </select>
        </div>
        <div class="setting-card">
          <label for="settingFont">字号</label>
          <select class="select-field" id="settingFont" data-setting="fontScale">
            <option value="0.92">小</option>
            <option value="1">中</option>
            <option value="1.12">大</option>
            <option value="1.24">特大</option>
          </select>
        </div>
        <div class="setting-card">
          <label for="settingMotion">动效强度</label>
          <select class="select-field" id="settingMotion" data-setting="motion">
            <option value="full">完整</option>
            <option value="soft">柔和</option>
            <option value="off">关闭</option>
          </select>
        </div>
        <div class="setting-card">
          <label for="settingAutoplay">自动播放</label>
          <select class="select-field" id="settingAutoplay" data-setting="autoplay">
            <option value="0">关闭</option>
            <option value="4200">慢</option>
            <option value="3000">中</option>
            <option value="1900">快</option>
          </select>
        </div>
        <div class="setting-card">
          <label for="settingChoiceStats">选项次数统计</label>
          <select class="select-field" id="settingChoiceStats" data-setting="trackChoiceStats">
            <option value="false">关闭</option>
            <option value="true">开启</option>
          </select>
        </div>
      `;
      el.recordList.appendChild(wrapper);
      wrapper.querySelector('[data-setting="colorMode"]').value = state.settings.colorMode === "dark" ? "dark" : "light";
      wrapper.querySelector('[data-setting="fontScale"]').value = String(state.settings.fontScale);
      wrapper.querySelector('[data-setting="motion"]').value = state.settings.motion;
      wrapper.querySelector('[data-setting="autoplay"]').value = String(state.settings.autoplay);
      wrapper.querySelector('[data-setting="trackChoiceStats"]').value = state.settings.trackChoiceStats ? "true" : "false";
    }

    function renderSaveSlots() {
      el.recordTitle.textContent = "存档槽";
      el.recordList.classList.add("wide");
      const auto = getValidAutoSave();
      appendSaveSlot("自动存档", auto?.snapshot, "auto");
      for (let i = 1; i <= 3; i += 1) {
        appendSaveSlot(`手动存档 ${i}`, readSlot(i), String(i));
      }
    }

    function renderPlayStats() {
      flushPlayTime();
      el.recordTitle.textContent = "游玩统计";
      el.recordList.classList.add("wide");
      const stats = readPlayStats();
      appendRecordItem("开始新故事", `${stats.playthroughs || 0} 次`, false);
      appendRecordItem("抵达结局", `${stats.endingsReached || 0} 次`, false);
      appendRecordItem("游戏时长", formatDuration(stats.playTimeMs || 0), false);
    }

    function renderChapterSelect() {
      el.recordTitle.textContent = "选择章节";
      el.recordList.classList.add("wide");
      const checkpoints = readCheckpoints().filter(item => item.kind === "chapter");
      const byNode = new Map(checkpoints.map(item => [item.nodeId, item]));
      const chapters = Object.entries(state.story.nodes || {})
        .filter(([, node]) => node.chapterTitle)
        .map(([nodeId, node]) => ({
          nodeId,
          title: node.chapterTitle,
          checkpoint: byNode.get(nodeId)
        }));

      if (!chapters.length) {
        appendRecordItem("没有章节节点", "剧本中没有带 chapterTitle 的节点。", false);
        return;
      }

      chapters.forEach(chapter => {
        const item = document.createElement("div");
        item.className = `record-item${chapter.checkpoint ? "" : " locked"}`;
        if (!chapter.checkpoint) {
          const mark = document.createElement("div");
          mark.className = "unknown-mark";
          mark.textContent = "LOCK";
          item.appendChild(mark);
        }
        const title = document.createElement("strong");
        title.textContent = chapter.checkpoint ? chapter.title : "？？？";
        const body = document.createElement("span");
        body.textContent = chapter.checkpoint ? describeSnapshot(chapter.checkpoint.snapshot) : "尚未游玩到此章节";
        const actions = document.createElement("div");
        actions.className = "record-actions";
        if (chapter.checkpoint) actions.append(makeMiniButton("从这里开始", "load-checkpoint", chapter.checkpoint.id));
        item.append(title, body);
        if (chapter.checkpoint) appendSnapshotTags(item, chapter.checkpoint.snapshot);
        item.append(actions);
        el.recordList.appendChild(item);
      });
    }

    function renderMenuChapterSelect() {
      el.menuChapterList.innerHTML = "";
      const checkpoints = readCheckpoints().filter(item => item.kind === "chapter");
      const byNode = new Map(checkpoints.map(item => [item.nodeId, item]));
      const chapters = Object.entries(state.story?.nodes || {})
        .filter(([, node]) => node.chapterTitle)
        .map(([nodeId, node]) => ({
          nodeId,
          title: node.chapterTitle,
          checkpoint: byNode.get(nodeId)
        }));

      if (!chapters.length) {
        const item = document.createElement("div");
        item.className = "record-item";
        item.textContent = "没有可选择的章节。";
        el.menuChapterList.appendChild(item);
      }

      chapters.forEach(chapter => {
        const item = document.createElement("div");
        item.className = `record-item${chapter.checkpoint ? "" : " locked"}`;
        const title = document.createElement("strong");
        title.textContent = chapter.checkpoint ? chapter.title : "？？？";
        const body = document.createElement("span");
        body.textContent = chapter.checkpoint ? describeSnapshot(chapter.checkpoint.snapshot) : "尚未游玩到此章节";
        const actions = document.createElement("div");
        actions.className = "record-actions";
        if (chapter.checkpoint) actions.append(makeMiniButton("从这里开始", "load-checkpoint", chapter.checkpoint.id));
        item.append(title, body);
        if (chapter.checkpoint) appendSnapshotTags(item, chapter.checkpoint.snapshot);
        item.append(actions);
        el.menuChapterList.appendChild(item);
      });

      el.menuChapterList.classList.toggle("is-hidden");
    }

    function appendSaveSlot(titleText, snapshot, slot) {
      const item = document.createElement("div");
      item.className = "record-item";
      const title = document.createElement("strong");
      title.textContent = titleText;
      const body = document.createElement("span");
      body.textContent = snapshot ? describeSnapshot(snapshot) : "空存档";
      const actions = document.createElement("div");
      actions.className = "record-actions";

      if (snapshot) {
        actions.append(makeMiniButton("读取", "load-slot", slot));
        if (slot !== "auto") actions.append(makeMiniButton("删除", "delete-slot", slot));
      }
      item.append(title, body);
      if (snapshot) appendSnapshotTags(item, snapshot);
      item.append(actions);
      el.recordList.appendChild(item);
    }

    function makeMiniButton(text, action, value) {
      const button = document.createElement("button");
      button.className = "mini-btn";
      button.type = "button";
      button.textContent = text;
      button.dataset.action = action;
      button.dataset.value = value;
      return button;
    }

    function saveGame() {
      if (!state.story || !state.currentNodeId) return;
      const save = {
        storyTitle: state.story.meta.title,
        snapshot: getSnapshot()
      };
      safeLocalSet(`${state.storageKey}_save`, JSON.stringify(save), "自动存档");
    }

    function readSave() {
      try {
        return JSON.parse(localStorage.getItem(`${state.storageKey}_save`) || "null");
      } catch {
        return null;
      }
    }

    function isValidAutoSave(save) {
      if (!state.story || !save || save.storyTitle !== state.story.meta.title) return false;
      const snapshot = save.snapshot;
      if (!snapshot || typeof snapshot.currentNodeId !== "string") return false;
      const node = state.story.nodes?.[snapshot.currentNodeId];
      if (!node || node.isEnding) return false;
      return true;
    }

    function getValidAutoSave() {
      const save = readSave();
      if (isValidAutoSave(save)) return save;
      if (save && state.story) safeLocalRemove(`${state.storageKey}_save`, "自动存档");
      return null;
    }

    function restoreSave(save) {
      if (!save?.snapshot) return;
      restoreSnapshot(save.snapshot);
    }

    function readEndings() {
      try {
        return JSON.parse(localStorage.getItem(`${state.storageKey}_endings`) || "[]");
      } catch {
        return [];
      }
    }

    function readAchievements() {
      try {
        return JSON.parse(localStorage.getItem(`${state.storageKey}_achievements`) || "[]");
      } catch {
        return [];
      }
    }

    function readPlayStats() {
      try {
        return {
          playthroughs: 0,
          endingsReached: 0,
          playTimeMs: 0,
          choiceCounts: {},
          ...JSON.parse(localStorage.getItem(`${state.storageKey}_stats`) || "{}")
        };
      } catch {
        return { playthroughs: 0, endingsReached: 0, playTimeMs: 0, choiceCounts: {} };
      }
    }

    function savePlayStats(stats) {
      safeLocalSet(`${state.storageKey}_stats`, JSON.stringify(stats), "游玩统计");
    }

    function recordPlaythroughStart() {
      if (!state.story) return;
      const stats = readPlayStats();
      stats.playthroughs = (stats.playthroughs || 0) + 1;
      stats.lastStartedAt = new Date().toISOString();
      savePlayStats(stats);
    }

    function recordEndingReached(node) {
      if (!state.story) return;
      const stats = readPlayStats();
      stats.endingsReached = (stats.endingsReached || 0) + 1;
      stats.lastEndingTitle = node?.title || "";
      stats.lastEndingAt = new Date().toISOString();
      savePlayStats(stats);
    }

    function flushPlayTime(stop = false) {
      if (!state.story || !state.sessionStartedAt) return;
      const now = Date.now();
      const delta = Math.max(0, now - state.sessionStartedAt);
      if (delta < 1000) {
        if (stop) state.sessionStartedAt = 0;
        return;
      }
      const stats = readPlayStats();
      stats.playTimeMs = (stats.playTimeMs || 0) + delta;
      stats.lastPlayedAt = new Date().toISOString();
      savePlayStats(stats);
      state.sessionStartedAt = stop ? 0 : now;
    }

    function recordChoiceStat(choice) {
      if (!state.story || !state.settings.trackChoiceStats || !choice) return;
      const stats = readPlayStats();
      const key = `${state.currentNodeId}::${choice.text || choice.next || "choice"}`;
      const record = stats.choiceCounts?.[key] || {
        key,
        nodeId: state.currentNodeId,
        text: choice.text || "继续",
        next: choice.next || "",
        count: 0
      };
      record.count += 1;
      record.lastAt = new Date().toISOString();
      stats.choiceCounts = { ...(stats.choiceCounts || {}), [key]: record };
      savePlayStats(stats);
    }

    function getChoiceStatCount(choice) {
      if (!state.story || !choice) return 0;
      const stats = readPlayStats();
      const key = `${state.currentNodeId}::${choice.text || choice.next || "choice"}`;
      return Number(stats.choiceCounts?.[key]?.count || 0);
    }

    function formatDuration(ms) {
      const totalSeconds = Math.floor((Number(ms) || 0) / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours) return `${hours} 小时 ${minutes} 分钟`;
      if (minutes) return `${minutes} 分钟 ${seconds} 秒`;
      return `${seconds} 秒`;
    }

    function readCheckpoints() {
      try {
        return JSON.parse(localStorage.getItem(`${state.storageKey}_checkpoints`) || "[]");
      } catch {
        return [];
      }
    }

    function saveCheckpoints(checkpoints) {
      safeLocalSet(`${state.storageKey}_checkpoints`, JSON.stringify(checkpoints.slice(-80)), "检查点");
    }

    function recordCheckpoint(nodeId, label, kind = "manual", snapshotOverride = null) {
      if (!state.story || !nodeId) return;
      const snapshot = snapshotOverride
        ? compactSnapshot(snapshotOverride)
        : getSnapshot({ includeHistory: false, includeChoiceHistory: false });
      snapshot.currentNodeId = nodeId;
      if (kind === "chapter") {
        snapshot.segmentIndex = 0;
      } else if (kind === "choice") {
        snapshot.segmentIndex = (state.story.nodes[nodeId]?.segments || []).length;
      }
      const checkpoints = kind === "chapter"
        ? readCheckpoints().filter(item => !(item.kind === kind && item.nodeId === nodeId))
        : readCheckpoints();
      checkpoints.push({
        id: `${kind}_${slug(nodeId)}_${Date.now()}`,
        kind,
        nodeId,
        label,
        snapshot,
        at: new Date().toISOString()
      });
      saveCheckpoints(checkpoints);
      state.checkpoints = checkpoints;
    }

    function loadCheckpointById(id) {
      const checkpoint = readCheckpoints().find(item => item.id === id);
      if (!checkpoint?.snapshot) return;
      if (checkpoint.kind === "choice") state.skipNextChoiceCheckpoint = true;
      restoreSnapshot(checkpoint.snapshot);
      el.launcher.classList.add("is-hidden");
      el.body.dataset.mode = "play";
      el.recordPanel.classList.remove("is-visible");
      el.body.classList.remove("home-modal-open");
      processNode(state.currentNodeId, { fromHistory: true, showChapter: true, keepSegment: true });
    }

    function returnToPreviousCheckpoint() {
      const choiceSnapshot = takePreviousChoiceSnapshot();
      if (choiceSnapshot) {
        closeMenu();
        restoreChoiceSnapshot(choiceSnapshot);
        showToast("已退回上一个选择", choiceSnapshot.choiceLabel || choiceSnapshot.currentNodeId);
        return;
      }
      const checkpoints = readCheckpoints();
      if (!checkpoints.length) {
        showToast("没有检查点", "尚未记录可回退的检查点。");
        return;
      }
      const current = state.currentNodeId;
      const candidates = checkpoints.filter(item => item.nodeId !== current || item.kind !== "choice");
      const checkpoint = candidates[candidates.length - 1] || checkpoints[checkpoints.length - 1];
      closeMenu();
      loadCheckpointById(checkpoint.id);
      showToast("已回到检查点", checkpoint.label || checkpoint.nodeId);
    }

    function readSettings() {
      try {
        return { colorMode: "light", fontScale: 1, motion: "full", autoplay: 0, trackChoiceStats: false, ...JSON.parse(localStorage.getItem("branch_story_settings") || "{}") };
      } catch {
        return { colorMode: "light", fontScale: 1, motion: "full", autoplay: 0, trackChoiceStats: false };
      }
    }

    function saveSettings() {
      safeLocalSet("branch_story_settings", JSON.stringify(state.settings), "设置");
    }

    function applySettings() {
      document.documentElement.style.setProperty("--story-font-scale", state.settings.fontScale);
      el.body.dataset.motion = state.settings.motion || "full";
      const colorMode = state.settings.colorMode === "dark" ? "dark" : "light";
      state.settings.colorMode = colorMode;
      state.settings.trackChoiceStats = state.settings.trackChoiceStats === true || state.settings.trackChoiceStats === "true";
      el.body.dataset.colorMode = colorMode;
      el.body.dataset.theme = "neutral";
      syncColorModeControls();
    }

    function setColorMode(mode) {
      state.settings.colorMode = mode === "dark" ? "dark" : "light";
      saveSettings();
      applySettings();
    }

    function syncColorModeControls() {
      const current = state.settings.colorMode === "dark" ? "dark" : "light";
      document.querySelectorAll("[data-color-mode-choice]").forEach(button => {
        button.classList.toggle("is-active", button.dataset.colorModeChoice === current);
      });
      document.querySelectorAll('[data-setting="colorMode"]').forEach(input => {
        input.value = current;
      });
    }

    function scheduleAutoplay() {
      clearTimeout(state.autoplayTimer);
      const delay = Number(state.settings.autoplay || 0);
      if (!delay || el.body.dataset.mode !== "play") return;
      state.autoplayTimer = setTimeout(() => {
        if (!el.choices.classList.contains("is-visible")) advance();
      }, delay);
    }

    function readSlot(slot) {
      try {
        return JSON.parse(localStorage.getItem(`${state.storageKey}_slot_${slot}`) || "null");
      } catch {
        return null;
      }
    }

    function writeSlot(slot) {
      if (!state.story || !state.currentNodeId) return;
      safeLocalSet(`${state.storageKey}_slot_${slot}`, JSON.stringify(getSnapshot()), "手动存档");
      showToast("已写入存档槽", `手动存档 ${slot}`);
      renderHomeRecords("saves");
    }

    function loadSlot(slot) {
      const snapshot = slot === "auto" ? getValidAutoSave()?.snapshot : readSlot(slot);
      if (!snapshot) return;
      restoreSnapshot(snapshot);
      el.launcher.classList.add("is-hidden");
      el.body.dataset.mode = "play";
      el.recordPanel.classList.remove("is-visible");
      el.body.classList.remove("home-modal-open");
      processNode(state.currentNodeId, { fromHistory: true, showChapter: false, keepSegment: true });
    }

    function deleteSlot(slot) {
      safeLocalRemove(`${state.storageKey}_slot_${slot}`, "手动存档");
      renderHomeRecords("saves");
    }

    function getSnapshotDecisionLabels(snapshot, limit = 4) {
      const decisions = Array.isArray(snapshot?.keyDecisions) ? snapshot.keyDecisions : [];
      const labels = [];
      decisions.forEach(item => {
        const label = item?.label || item?.id;
        if (label && !labels.includes(label)) labels.push(label);
      });
      if (!labels.length && snapshot?.flagLabels) {
        (snapshot.flags || []).forEach(flag => {
          const label = snapshot.flagLabels[flag];
          if (label && !labels.includes(label)) labels.push(label);
        });
      }
      return {
        labels: labels.slice(0, limit),
        hiddenCount: Math.max(0, labels.length - limit)
      };
    }

    function appendSnapshotTags(parent, snapshot) {
      if (!snapshot) return;
      const tags = document.createElement("div");
      tags.className = "snapshot-tags";

      const stateTag = document.createElement("span");
      stateTag.className = "snapshot-tag state";
      stateTag.textContent = `缓存状态：${state.story?.meta.variableName || "状态值"} ${Math.round(snapshot.val || 0)}`;
      tags.appendChild(stateTag);

      const { labels, hiddenCount } = getSnapshotDecisionLabels(snapshot);
      labels.forEach(label => {
        const tag = document.createElement("span");
        tag.className = "snapshot-tag";
        tag.textContent = `关键：${label}`;
        tags.appendChild(tag);
      });
      if (hiddenCount) {
        const more = document.createElement("span");
        more.className = "snapshot-tag state";
        more.textContent = `另有 ${hiddenCount} 项`;
        tags.appendChild(more);
      }

      parent.appendChild(tags);
    }

    function describeSnapshot(snapshot) {
      const node = snapshot.currentNodeId || "未知节点";
      const nodeTitle = state.story?.nodes?.[node]?.chapterTitle || state.story?.nodes?.[node]?.title || node;
      const value = Math.round(snapshot.val || 0);
      const { labels, hiddenCount } = getSnapshotDecisionLabels(snapshot, 2);
      const decisions = labels.length
        ? ` · 关键：${labels.join(" / ")}${hiddenCount ? "…" : ""}`
        : "";
      return `${nodeTitle} · ${state.story?.meta.variableName || "状态值"} ${value}${decisions}`;
    }

    function validateStory(story) {
      const issues = [];
      const nodes = story.nodes || {};
      const ids = new Set(Object.keys(nodes));
      const edges = new Map();

      for (const [id, node] of Object.entries(nodes)) {
        const nextIds = [];
        if (node.next) nextIds.push(node.next);
        (node.choices || []).forEach(choice => choice.next && nextIds.push(choice.next));
        (node.routes || []).forEach(route => route.next && nextIds.push(route.next));
        edges.set(id, nextIds);

        nextIds.forEach(next => {
          if (!ids.has(next)) {
            issues.push({ level: "error", title: `断链：${id}`, detail: `指向不存在的节点 ${next}` });
          }
        });

        if (!node.isEnding && !node.next && !node.choices && !node.routes) {
          issues.push({ level: "error", title: `死路：${id}`, detail: "该节点不是结局，也没有后续跳转。" });
        }

        if (node.isEnding && !(node.closing || node.finalText || node.epilogue)) {
          issues.push({ level: "warn", title: `结局缺少收束语：${id}`, detail: "建议给每个结局添加 closing，让结局最后有一段明确的余韵文字。" });
        }

        if (!node.isEnding && (node.segments || node.choices) && !node.scene) {
          issues.push({ level: "warn", title: `缺少场景：${id}`, detail: "建议给有正文或选项的节点添加 scene，方便播放器显示场景名和转场。" });
        }
      }

      const reachable = new Set();
      const stack = [story.startNodeId];
      while (stack.length) {
        const id = stack.pop();
        if (!id || reachable.has(id) || !ids.has(id)) continue;
        reachable.add(id);
        (edges.get(id) || []).forEach(next => stack.push(next));
      }

      ids.forEach(id => {
        if (!reachable.has(id)) {
          issues.push({ level: "warn", title: `不可抵达：${id}`, detail: "从 startNodeId 出发无法到达这个节点。" });
        }
      });

      return issues;
    }

    function showValidationImportResult() {
      if (!state.validation.length) {
        showToast("剧本校验通过", "没有发现断链、死路或不可抵达节点。");
        return;
      }
      const errors = state.validation.filter(item => item.level === "error").length;
      const warnings = state.validation.length - errors;
      showToast("剧本校验提示", `${errors} 个错误，${warnings} 个提醒。详情已写在作品信息行。`);
    }

    function showToast(title, body) {
      el.toast.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(body || "")}`;
      el.toast.classList.add("is-visible");
      setTimeout(() => el.toast.classList.remove("is-visible"), 2600);
    }

    function showImportantDecision(label = "") {
      clearTimeout(state.decisionTimer);
      el.decisionFloat.textContent = label
        ? `重要决定已记录：${label}`
        : "重要决定已记录";
      el.decisionFloat.classList.remove("is-visible");
      void el.decisionFloat.offsetWidth;
      el.decisionFloat.classList.add("is-visible");
      state.decisionTimer = setTimeout(() => {
        el.decisionFloat.classList.remove("is-visible");
      }, 1800);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function clearMemory() {
      if (!state.story) return;
      if (el.clearHomeBtn.dataset.confirm !== "true") {
        el.clearHomeBtn.dataset.confirm = "true";
        el.clearHomeBtn.textContent = "确认清除";
        showToast("再次点击确认", "这会清除本作品的自动存档、手动存档、结局、成就、检查点和游玩统计。");
        setTimeout(() => {
          if (el.clearHomeBtn.dataset.confirm === "true") {
            delete el.clearHomeBtn.dataset.confirm;
            el.clearHomeBtn.textContent = "清除记录";
          }
        }, 3600);
        return;
      }
      delete el.clearHomeBtn.dataset.confirm;
      el.clearHomeBtn.textContent = "清除记录";
      safeLocalRemove(`${state.storageKey}_save`, "自动存档");
      safeLocalRemove(`${state.storageKey}_endings`, "结局记录");
      safeLocalRemove(`${state.storageKey}_achievements`, "成就记录");
      safeLocalRemove(`${state.storageKey}_checkpoints`, "检查点");
      safeLocalRemove(`${state.storageKey}_stats`, "游玩统计");
      for (let i = 1; i <= 3; i += 1) safeLocalRemove(`${state.storageKey}_slot_${i}`, "手动存档");
      state.history = [];
      state.pageHistory = [];
      state.choiceHistory = [];
      state.flagLabels = {};
      state.keyDecisions = [];
      state.endings = [];
      state.achievements = [];
      state.checkpoints = [];
      state.sessionStartedAt = 0;
      updateStatus();
      checkContinue();
      renderHomeRecords("none");
    }

    function compactChoiceSnapshot(snapshot) {
      return {
        currentNodeId: snapshot.currentNodeId,
        segmentIndex: snapshot.segmentIndex || 0,
        val: snapshot.val || 0,
        vars: deepClone(snapshot.vars || {}),
        flags: deepClone(snapshot.flags || []),
        flagLabels: deepClone(snapshot.flagLabels || {}),
        keyDecisions: deepClone(snapshot.keyDecisions || []),
        currentSceneKey: snapshot.currentSceneKey || "",
        choiceLabel: snapshot.choiceLabel || "",
        choiceAt: snapshot.choiceAt || ""
      };
    }

    function compactPageSnapshot(snapshot) {
      return {
        ...compactChoiceSnapshot(snapshot),
        wasChoiceVisible: Boolean(snapshot.wasChoiceVisible),
        displayText: snapshot.displayText || "",
        displaySpeaker: snapshot.displaySpeaker || ""
      };
    }

    function compactSnapshot(snapshot) {
      return {
        ...compactChoiceSnapshot(snapshot),
        history: [],
        choiceHistory: (snapshot.choiceHistory || []).map(compactChoiceSnapshot)
      };
    }

    function getSnapshot(options = {}) {
      const includeHistory = options.includeHistory !== false;
      const includeChoiceHistory = options.includeChoiceHistory !== false;
      return {
        currentNodeId: state.currentNodeId,
        segmentIndex: state.segmentIndex,
        val: state.val,
        vars: deepClone(state.vars),
        flags: deepClone(state.flags),
        flagLabels: deepClone(state.flagLabels || {}),
        keyDecisions: deepClone(state.keyDecisions || []),
        currentSceneKey: state.currentSceneKey,
        history: includeHistory ? state.history.map(compactSnapshot) : [],
        choiceHistory: includeChoiceHistory ? state.choiceHistory.map(compactSnapshot) : []
      };
    }

    function restoreSnapshot(snapshot) {
      state.currentNodeId = snapshot.currentNodeId;
      state.segmentIndex = snapshot.segmentIndex || 0;
      state.val = snapshot.val || 0;
      state.vars = deepClone(snapshot.vars || {});
      state.flags = deepClone(snapshot.flags || []);
      state.flagLabels = deepClone(snapshot.flagLabels || {});
      state.keyDecisions = deepClone(snapshot.keyDecisions || []);
      state.history = deepClone(snapshot.history || []);
      state.choiceHistory = deepClone(snapshot.choiceHistory || []);
      state.currentSceneKey = snapshot.currentSceneKey || "";
      updateStatus();
    }

    function getNode(id) {
      const node = state.story?.nodes?.[id];
      if (!node) throw new Error(`节点不存在：${id}`);
      return node;
    }

    function normalizeSegment(segment) {
      if (typeof segment === "string") return { speaker: "", text: segment, effects: [] };
      return {
        speaker: segment.speaker || "",
        text: segment.text || "",
        effects: mergeEffects(segment.effect, segment.effects)
      };
    }

    function mergeEffects(...values) {
      return values.flatMap(value => {
        if (!value) return [];
        return Array.isArray(value) ? value : [value];
      }).filter(Boolean);
    }

    function parseLiteral(raw) {
      const text = raw.trim();
      if (/^['"].*['"]$/.test(text)) return text.slice(1, -1);
      if (text === "true") return true;
      if (text === "false") return false;
      if (!Number.isNaN(Number(text))) return Number(text);
      return text;
    }

    function isSystemSpeaker(speaker) {
      return ["系统", "System", "旁白", "Narrator"].includes(speaker);
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, Number(value) || 0));
    }

    function deepClone(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function slug(text) {
      return String(text || "story").replace(/[^\p{L}\p{N}]+/gu, "_").slice(0, 48);
    }


    function advance() {
      if (!el.sceneCard.classList.contains("is-hidden")) return;
      if (state.isInputLocked && el.overlayScreen.classList.contains("is-hidden")) {
        state.isInputLocked = false;
      }
      if (state.isInputLocked || !state.story || el.choices.classList.contains("is-visible")) return;
      const node = getNode(state.currentNodeId);
      if (node.isEnding) return;
      const segments = node.segments || [];
      if (state.segmentIndex < segments.length) {
        pushPageHistory();
        state.segmentIndex += 1;
        saveGame();
        renderSegment();
      }
    }

    function handlePageClick(event) {
      if (event.defaultPrevented) return;
      if (!el.sceneCard.classList.contains("is-hidden")) return;
      if (event.target.closest("button, input, textarea, select, .launcher, .menu-panel")) return;
      if (el.body.dataset.mode !== "play") return;
      advance();
    }

    document.addEventListener("click", event => {
      const clickable = event.target.closest("button");
      if (!clickable) return;
      clickable.classList.remove("clicked");
      void clickable.offsetWidth;
      clickable.classList.add("clicked");
      setTimeout(() => clickable.classList.remove("clicked"), 280);
    }, true);

    document.addEventListener("pointerdown", event => {
      if (!el.body.classList.contains("home-modal-open")) return;
      if (event.target.closest(".record-panel, .home-actions, .launcher-actions")) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      closeHomeModals();
    }, true);
    document.addEventListener("click", event => {
      if (!el.body.classList.contains("home-modal-open")) return;
      if (event.target.closest(".record-panel, .home-actions, .launcher-actions")) return;
      event.preventDefault();
      event.stopImmediatePropagation();
    }, true);
    el.startBtn.addEventListener("click", () => startGame(false));
    el.continueBtn.addEventListener("click", () => startGame(true));
    el.homeEndingsBtn.addEventListener("click", () => renderHomeRecords("endings"));
    el.homeAchievementsBtn.addEventListener("click", () => renderHomeRecords("achievements"));
    el.homeChaptersBtn.addEventListener("click", () => renderHomeRecords("chapters"));
    el.homeSavesBtn.addEventListener("click", () => renderHomeRecords("saves"));
    el.homeStatsBtn.addEventListener("click", () => renderHomeRecords("stats"));
    el.homeSettingsBtn.addEventListener("click", () => renderHomeRecords("settings"));
    el.clearHomeBtn.addEventListener("click", clearMemory);
    el.recordList.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const slot = button.dataset.value;
      if (button.dataset.action === "load-slot") loadSlot(slot);
      if (button.dataset.action === "delete-slot") deleteSlot(slot);
      if (button.dataset.action === "load-checkpoint") loadCheckpointById(slot);
    });
    el.recordList.addEventListener("change", event => {
      const input = event.target.closest("[data-setting]");
      if (!input) return;
      const key = input.dataset.setting;
      state.settings[key] = key === "fontScale" || key === "autoplay"
        ? Number(input.value)
        : key === "trackChoiceStats"
          ? input.value === "true"
          : input.value;
      saveSettings();
      applySettings();
      showToast("设置已更新", "新的阅读设置已经保存。");
    });
    document.addEventListener("click", event => {
      const button = event.target.closest("[data-color-mode-choice]");
      if (!button) return;
      event.stopPropagation();
      setColorMode(button.dataset.colorModeChoice);
      showToast("明暗模式已更新", button.textContent.trim());
    });
    document.addEventListener("click", handlePageClick);
    el.pageBackBtn.addEventListener("click", goBackPage);
    el.backBtn.addEventListener("click", goBack);
    el.menuBtn.addEventListener("click", openMenu);
    el.menuPanel.addEventListener("click", event => {
      if (event.target === el.menuPanel) closeMenu();
    });
    el.resumeBtn.addEventListener("click", closeMenu);
    el.homeBtn.addEventListener("click", returnToHome);
    el.skipBtn.addEventListener("click", () => {
      closeMenu();
      skipToChoice();
    });
    el.pageBackMenuBtn.addEventListener("click", () => {
      closeMenu();
      goBackPage();
    });
    el.checkpointBtn.addEventListener("click", () => {
      closeMenu();
      goBack();
    });
    el.menuChaptersBtn.addEventListener("click", renderMenuChapterSelect);
    el.menuChapterList.addEventListener("click", event => {
      const button = event.target.closest("button[data-action='load-checkpoint']");
      if (!button) return;
      closeMenu();
      loadCheckpointById(button.dataset.value);
    });
    el.quickSaveBtn.addEventListener("click", () => {
      writeSlot(1);
      closeMenu();
    });

    document.addEventListener("keydown", event => {
      if (event.defaultPrevented) return;
      if (el.body.classList.contains("home-modal-open")) {
        event.preventDefault();
        event.stopImmediatePropagation();
        if (event.key === "Escape") closeHomeModals();
        return;
      }
      if (event.target.closest?.("input, textarea, select")) return;
      if (event.key === "Escape") {
        if (!el.menuPanel.classList.contains("is-hidden")) closeMenu();
        else if (state.story && el.body.dataset.mode === "play") openMenu();
      }
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        advance();
      }
      if (event.key === "ArrowLeft") goBackPage();
      if (event.key === "ArrowRight") skipToChoice();
      if (event.key === "Backspace") {
        event.preventDefault();
        goBackPage();
      }
    });
    window.addEventListener("beforeunload", flushPlayTime);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") flushPlayTime();
    });
    applySettings();
    try { loadStory(EMBEDDED_STORY, { animate: false, cache: false }); } catch (error) { console.error("内置剧本加载失败", error); }
  </script>
</body>
